 <nav>

<section class="hero" id="hero">

<div class="hero-overlay"></div>

<div class="hero-fade"></div>

<div class="hero-content">

<h2>

</h2>

<p>

</p>

<footer>

<p>
Instagram:
<a href="https://www.instagram.com/vantage.running" target="_blank">
@vantage.running
</a>
</p>

</footer>

<script>

const hero = document.getElementById("hero");
const fadeLayer = document.querySelector(".hero-fade");


const heroImages = [
    "Images/hero1.jpg",
    "Images/hero2.jpg",
    "Images/hero3.jpg"
];


let currentHero = 0;


setInterval(function(){


    currentHero++;


    if(currentHero >= heroImages.length){
        currentHero = 0;
    }


    fadeLayer.style.backgroundImage =
    "linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('" 
    + heroImages[currentHero] 
    + "')";


    fadeLayer.style.opacity = "1";


    setTimeout(function(){

        hero.style.backgroundImage =
        fadeLayer.style.backgroundImage;


        fadeLayer.style.opacity = "0";


    },1500);


},5000);


</script>


</body>
</html>
